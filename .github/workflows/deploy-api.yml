name: Deploy API
on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'docker/**'
      - 'deploy/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.gateway
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/freshblu-gateway:latest
            ghcr.io/${{ github.repository_owner }}/freshblu-gateway:${{ github.sha }}

      - name: Build and push router image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.router
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/freshblu-router:latest
            ghcr.io/${{ github.repository_owner }}/freshblu-router:${{ github.sha }}

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u github-actions --password-stdin
            cd /opt/freshblu
            git pull origin main
            cd deploy/digitalocean
            docker compose pull gateway router
            docker compose up -d
            docker logout ghcr.io
            docker image prune -f
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
