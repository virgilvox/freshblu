services:
  freshblu:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
      - "1883:1883"
    volumes:
      - freshblu-data:/data
    environment:
      - FRESHBLU_HTTP_PORT=3000
      - FRESHBLU_MQTT_PORT=1883
      - DATABASE_URL=sqlite:/data/freshblu.db
      - FRESHBLU_OPEN_REGISTRATION=true
      - RUST_LOG=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/status"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  freshblu-data:
